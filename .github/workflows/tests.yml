name: Ejecutar Tests y Actualizar Early

on:
  push:
    branches:
      - main # Solo salta cuando subes cosas a main

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Da permiso al bot para escribir en las ramas

    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Descarga todo el historial de ramas para poder fusionarlas

      - name: 2. Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Ejecutar los tests
        run: mvn test 
        # NOTA: Si en clase no usáis Maven para compilar, dímelo y cambiamos este comando

      - name: 4. Actualizar rama early
        # Este paso SOLO se ejecuta si el anterior (los tests) no da ningún error
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git checkout early
          git merge origin/main --no-edit
          git push origin early